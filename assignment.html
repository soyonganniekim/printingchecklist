<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출력 과제용 체크리스트</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <!-- topbar -->
  <header class="topbar">
    <a href="index.html">
      <span class="pc-only" data-ko="단행본 체크리스트로 이동하기" data-en="Go to Book Checklist">단행본 체크리스트로 이동하기</span>
      <span class="mobile-only" data-ko="단행본" data-en="Book">단행본</span>
    </a>

    <div class="topbar-right">
      <button id="langToggle">EN</button>
      <button id="darkToggle">Dark</button>

      <button id="exportImage">
        <span class="pc-only" data-ko="JPG로 내보내기" data-en="Export as JPG">JPG로 내보내기</span>
        <span class="mobile-only">JPG</span>
      </button>

      <button id="exportPDF">
        <span class="pc-only" data-ko="PDF로 내보내기" data-en="Export as PDF">PDF로 내보내기</span>
        <span class="mobile-only">PDF</span>
      </button>
    </div>
  </header>

  <!-- main -->
  <main class="page" id="captureArea">

    <!-- header -->
    <header class="page-header">
      <h1 data-ko="출력 과제용 체크리스트" data-en="Print Assignment Checklist">
        출력 과제용 체크리스트
      </h1>
      <p data-ko="오늘도 무사고 하십쇼!" data-en="May every print come out safely.">
        오늘도 무사고 하십쇼!
      </p>
    </header>

    <!-- info -->
    <div class="info-grid">
      <input data-ko-placeholder="과제명" data-en-placeholder="Assignment Title" placeholder="과제명" />
      <input data-ko-placeholder="수업명" data-en-placeholder="Class" placeholder="수업명" />
      <input data-ko-placeholder="제출일" data-en-placeholder="Due Date" placeholder="제출일" />
      <input data-ko-placeholder="인쇄소" data-en-placeholder="Print Shop" placeholder="인쇄소" />
      <input data-ko-placeholder="파일명" data-en-placeholder="File Name" placeholder="파일명" />
      <input data-ko-placeholder="인쇄 방식" data-en-placeholder="Print Method" placeholder="인쇄 방식" />
    </div>

    <!-- checklist -->
    <section class="section">
      <div class="section-title">
        <h2>1. 파일 출력 전 확인</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /> 최종 파일이 맞나요?</label>
        <label><input type="checkbox" /> 파일명을 규칙에 맞게 저장했나요?</label>
        <label><input type="checkbox" /> PDF로 저장했나요?</label>
        <label><input type="checkbox" /> 원본 파일을 백업했나요?</label>
      </div>
    </section>

    <!-- memo -->
    <section class="final-memo">
      <h2>메모</h2>
      <textarea placeholder="전체 메모를 입력하세요."></textarea>
    </section>

    <!-- upload -->
    <section class="final-memo">
      <h2>이미지 첨부</h2>

      <div class="upload">

        <!-- 파일 선택 -->
        <label class="file-box">
          <span>파일 선택</span>
          <input type="file" class="imageInput" accept="image/*" />
        </label>

        <!-- 이미지 미리보기 -->
        <img class="preview" alt="" />

        <!-- 삭제 버튼 -->
        <button type="button" class="remove-file">삭제</button>

      </div>
    </section>

    <!-- final -->
    <div class="final-check-line">
      <div class="final-field">
        <span>최종확인자</span>
        <input />
      </div>

      <div class="final-field">
        <span>작성일</span>
        <input />
      </div>
    </div>

    <!-- credit -->
    <div class="credit">
      Print Assignment Checklist<br>
      suran75@naver.com & soyonganniekim@gmail.com, 2026
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
