<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단행본 체크리스트</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <header class="topbar">
    <a href="assignment.html">과제용 체크리스트로 이동하기</a>

  <div class="topbar-right">
    <button id="langToggle">EN</button>
    <button id="darkToggle">Dark</button>

    <button id="exportImage">
      <span class="pc-only">JPG로 내보내기</span>
      <span class="mobile-only">JPG</span>
    </button>

    <button id="exportPDF">
      <span class="pc-only">PDF로 내보내기</span>
      <span class="mobile-only">PDF</span>
    </button>
  </div>
  </header>

  <main class="page" id="captureArea">

    <header class="page-header">
      <h1 data-ko="단행본 사고방지 체크리스트" data-en="Book Printing Error Prevention Checklist">
        단행본 사고방지 체크리스트
      </h1>
      <p data-ko="오늘도 무사고 하십쇼!" data-en="May every book arrive safely.">
        오늘도 무사고 하십쇼!
      </p>
    </header>

    <div class="info-grid">
      <input data-ko-placeholder="도서명" data-en-placeholder="Book Title" placeholder="도서명" />
      <input data-ko-placeholder="담당 편집자" data-en-placeholder="Editor" placeholder="담당 편집자" />
      <input data-ko-placeholder="인쇄소" data-en-placeholder="Printer" placeholder="인쇄소" />
      <input data-ko-placeholder="표지 디자이너" data-en-placeholder="Cover Designer" placeholder="표지 디자이너" />
      <input data-ko-placeholder="본문 디자이너" data-en-placeholder="Interior Designer" placeholder="본문 디자이너" />
      <input data-ko-placeholder="인쇄소 담당자" data-en-placeholder="Printer Contact" placeholder="인쇄소 담당자" />
    </div>

    <!-- 1 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="1. 표지 시안 체크" data-en="1. Cover Proof Check">1. 표지 시안 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>색 교정용 프린터로 출력해서 정확한 색을 확인했나요?</span></label>
        <label><input type="checkbox" /><span>화면과 출력물의 색 차이를 확인했나요?</span></label>
        <label><input type="checkbox" /><span>표지가 최신 판본인지 확인했나요?</span></label>
      </div>
    </section>

    <!-- 2 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="2. 마감 체크" data-en="2. Final File Check">2. 마감 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>ISBN 바코드를 앱으로 읽을 수 있나요?</span></label>
        <label><input type="checkbox" /><span>검색했을 때 타 도서가 뜨진 않나요?</span></label>
        <label><input type="checkbox" /><span>표지 / 띠지 / 판권 ISBN과 부가기호가 일치하나요?</span></label>
        <label><input type="checkbox" /><span>책등 두께가 정확한가요?</span></label>
        <label><input type="checkbox" /><span>본문 이미지가 너무 어둡지 않나요?</span></label>
        <label><input type="checkbox" /><span>양쪽에 걸친 이미지는 가운데 숨는 부분을 고려했나요?</span></label>

        <!-- 추가 -->
        <label><input type="checkbox" /><span>책 전장 길이가 종이에 잘 앉혀지는지 확인했나요?</span></label>
        <label><input type="checkbox" /><span>본문 앞뒤 맥락과 그림/텍스트가 서로 맞나요?</span></label>
        <label><input type="checkbox" /><span>최종 수정사항이 해당 페이지에 정확히 반영됐나요?</span></label>
        <label><input type="checkbox" /><span>다음 쇄 수정사항이 디자인 파일 / 편집본 / 제작발주서에 모두 반영됐나요?</span></label>
      </div>
    </section>

    <!-- 3 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="3. 별색 / 제작발주서 체크" data-en="3. Spot Color / Production Order Check">3. 별색 / 제작발주서 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>화면과 똑같이 나오려면 별색이 필요한지 확인했나요?</span></label>
        <label><input type="checkbox" /><span>제작발주서의 별색 컬러가 의도한 색상과 맞나요?</span></label>
        <label><input type="checkbox" /><span>팬톤 컬러번호를 검색해 일치 여부를 확인했나요?</span></label>
        <label><input type="checkbox" /><span>CMYK 4도로 잘못 작업한 것은 아닌지 확인했나요?</span></label>
        <label><input type="checkbox" /><span>인쇄소에 전달할 디자인 유의사항을 확인했나요?</span></label>

        <!-- 추가 -->
        <label><input type="checkbox" /><span>면적이 큰 색상은 별색 사용이 필요한지 다시 확인했나요?</span></label>
      </div>
    </section>

    <!-- 4 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="4. 검판 파일 체크" data-en="4. Proof File Check">4. 검판 파일 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>검판 파일의 텍스트가 최종 파일과 일치하나요?</span></label>
        <label><input type="checkbox" /><span>최종 수정사항을 몇 곳에서 다시 점검했나요?</span></label>
        <label><input type="checkbox" /><span>이미지나 글자 모양이 최종 PDF와 동일하게 표현되었나요?</span></label>
        <label><input type="checkbox" /><span>글자 아웃라인, 색 겹침, 오버프린트 문제를 확인했나요?</span></label>
      </div>
    </section>

    <!-- 5 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="5. 인쇄 감리 체크" data-en="5. Press Check">5. 인쇄 감리 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>폰이나 노트북 화면과 비교했나요?</span></label>
        <label><input type="checkbox" /><span>색 교정지를 지참했나요?</span></label>
        <label><input type="checkbox" /><span>일반적인 밝기에서 인쇄물 색을 확인했나요?</span></label>
        <label><input type="checkbox" /><span>본문 먹색이 너무 약하거나 짙지 않은가요?</span></label>
        <label><input type="checkbox" /><span>먹과 별색이 섞이는 표의 핀이 맞는지 확인했나요?</span></label>
        <label><input type="checkbox" /><span>코팅 후 색 변화를 예상했나요?</span></label>
      </div>
    </section>

    <!-- 6 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="6. 가제본 체크" data-en="6. Advance Copy Check">6. 가제본 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>표지, 띠지, 본문 색상이 알맞게 표현되었나요?</span></label>
        <label><input type="checkbox" /><span>쪽수가 차례대로 맞나요?</span></label>
        <label><input type="checkbox" /><span>내용이 인쇄 누락된 쪽은 없나요?</span></label>

        <!-- 추가 -->
        <label><input type="checkbox" /><span>이미지와 타이틀/캡션이 서로 정확히 맞나요?</span></label>
      </div>
    </section>

    <!-- 7 -->
    <section class="section">
      <div class="section-title">
        <h2 data-ko="7. 입고 도서 체크" data-en="7. Arrival Copy Check">7. 입고 도서 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span>쪽수가 차례대로 맞나요?</span></label>
        <label><input type="checkbox" /><span>내용이 인쇄 누락된 쪽은 없나요?</span></label>
        <label><input type="checkbox" /><span>입고 도서의 전체 상태를 확인했나요?</span></label>

        <!-- 추가 -->
        <label><input type="checkbox" /><span>표지, 본문, 제본 상태에 이상은 없나요?</span></label>
      </div>
    </section>

    <!-- 메모 -->
    <section class="final-memo">
      <h2>메모</h2>
      <textarea placeholder="전체 메모를 입력하세요."></textarea>

      <div class="upload">
        <div class="upload-title">이미지 첨부</div>

        <label class="file-box">
          <input type="file" class="imageInput" />
        </label>

        <img class="preview" />
      </div>
    </section>

    <!-- 최종 -->
    <div class="final-check-line">
      <div class="final-field">
        <span>최종확인자</span>
        <input />
      </div>
      <div class="final-field">
        <span>작성일</span>
        <input />
      </div>
    </div>

    <div class="credit">
      Book Printing Error Prevention Checklist<br>
      suran75@naver.com & soyonganniekim@gmail.com, 2026
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
