<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단행본 사고방지 체크리스트</title>

  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <header class="topbar">
    <a href="assignment.html">
      <span class="pc-only" data-ko="과제용 체크리스트로 이동하기" data-en="Go to Assignment Checklist">과제용 체크리스트로 이동하기</span>
      <span class="mobile-only" data-ko="과제용" data-en="Assignment">과제용</span>
    </a>

    <div class="topbar-right">
      <button id="langToggle">EN</button>
      <button id="darkToggle">Dark</button>

      <button id="exportImage">
        <span class="pc-only" data-ko="JPG로 내보내기" data-en="Export as JPG">JPG로 내보내기</span>
        <span class="mobile-only" data-ko="JPG" data-en="JPG">JPG</span>
      </button>

      <button id="exportPDF">
        <span class="pc-only" data-ko="PDF로 내보내기" data-en="Export as PDF">PDF로 내보내기</span>
        <span class="mobile-only" data-ko="PDF" data-en="PDF">PDF</span>
      </button>
    </div>
  </header>

  <main class="page" id="captureArea">

    <header class="page-header">
      <h1 data-ko="단행본 사고방지 체크리스트" data-en="Book Printing Error Prevention Checklist">
        단행본 사고방지 체크리스트
      </h1>
      <p data-ko="오늘도 무사고 하십쇼!" data-en="May every book arrive safely.">
        오늘도 무사고 하십쇼!
      </p>
    </header>

    <div class="info-grid">
      <input data-ko-placeholder="도서명" data-en-placeholder="Book Title" placeholder="도서명" />
      <input data-ko-placeholder="담당 편집자" data-en-placeholder="Editor" placeholder="담당 편집자" />
            <input data-ko-placeholder="표지 디자이너" data-en-placeholder="Cover Designer" placeholder="표지 디자이너" />
      <input data-ko-placeholder="인쇄소" data-en-placeholder="Printer" placeholder="인쇄소" />
      <input data-ko-placeholder="본문 디자이너" data-en-placeholder="Interior Designer" placeholder="본문 디자이너" />
      <input data-ko-placeholder="인쇄소 담당자" data-en-placeholder="Printer Contact" placeholder="인쇄소 담당자" />
    </div>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="1. 표지 시안 체크" data-en="1. Cover Proof Check">1. 표지 시안 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="색 교정용 프린터로 출력해서 정확한 색을 확인했나요?" data-en="Did you print with a color-proof printer to check accurate colors?">색 교정용 프린터로 출력해서 정확한 색을 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="화면과 출력물의 색 차이를 확인했나요?" data-en="Did you check the color difference between screen and print?">화면과 출력물의 색 차이를 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="표지가 최신 판본인지 확인했나요?" data-en="Is this the latest version of the cover?">표지가 최신 판본인지 확인했나요?</span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="2. 마감 체크" data-en="2. Final File Check">2. 마감 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="ISBN 바코드를 앱으로 읽을 수 있나요?" data-en="Can the ISBN barcode be scanned with an app?">ISBN 바코드를 앱으로 읽을 수 있나요?</span></label>
        <label><input type="checkbox" /><span data-ko="검색했을 때 타 도서가 뜨진 않나요?" data-en="Does it link to the correct book when searched?">검색했을 때 타 도서가 뜨진 않나요?</span></label>
        <label><input type="checkbox" /><span data-ko="표지 / 띠지 / 판권 ISBN과 부가기호가 일치하나요?" data-en="Do the ISBN and suffix match across the cover, band, and imprint page?">표지 / 띠지 / 판권 ISBN과 부가기호가 일치하나요?</span></label>
        <label><input type="checkbox" /><span data-ko="책등 두께가 정확한가요?" data-en="Is the spine thickness correct?">책등 두께가 정확한가요?</span></label>
        <label><input type="checkbox" /><span data-ko="본문 이미지가 너무 어둡지 않나요?" data-en="Are the interior images not too dark?">본문 이미지가 너무 어둡지 않나요?</span></label>
        <label><input type="checkbox" /><span data-ko="양쪽에 걸친 이미지는 가운데 숨는 부분을 고려했나요?" data-en="Did you account for the gutter in spread images?">양쪽에 걸친 이미지는 가운데 숨는 부분을 고려했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="책 전장 길이가 종이에 잘 앉혀지는지 확인했나요?" data-en="Does the full layout fit properly on the paper size?">책 전장 길이가 종이에 잘 앉혀지는지 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="본문 앞뒤 맥락과 그림/텍스트가 서로 맞나요?" data-en="Do images and text match the surrounding context?">본문 앞뒤 맥락과 그림/텍스트가 서로 맞나요?</span></label>
        <label><input type="checkbox" /><span data-ko="최종 수정사항이 해당 페이지에 정확히 반영됐나요?" data-en="Are final edits correctly applied to this page?">최종 수정사항이 해당 페이지에 정확히 반영됐나요?</span></label>
        <label><input type="checkbox" /><span data-ko="다음 쇄 수정사항이 디자인 파일 / 편집본 / 제작발주서에 모두 반영됐나요?" data-en="Are next-print revisions reflected in the design file, editorial file, and production order?">다음 쇄 수정사항이 디자인 파일 / 편집본 / 제작발주서에 모두 반영됐나요?</span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="3. 별색 / 제작발주서 체크" data-en="3. Spot Color / Production Order Check">3. 별색 / 제작발주서 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="화면과 똑같이 나오려면 별색이 필요한지 확인했나요?" data-en="Did you check if spot color is needed to match the screen color?">화면과 똑같이 나오려면 별색이 필요한지 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="제작발주서의 별색 컬러가 의도한 색상과 맞나요?" data-en="Do the spot colors in the production order match the intended colors?">제작발주서의 별색 컬러가 의도한 색상과 맞나요?</span></label>
        <label><input type="checkbox" /><span data-ko="팬톤 컬러번호를 검색해 일치 여부를 확인했나요?" data-en="Did you verify the Pantone color code?">팬톤 컬러번호를 검색해 일치 여부를 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="CMYK 4도로 잘못 작업한 것은 아닌지 확인했나요?" data-en="Did you check that it was not mistakenly set in CMYK?">CMYK 4도로 잘못 작업한 것은 아닌지 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="인쇄소에 전달할 디자인 유의사항을 확인했나요?" data-en="Did you check the design notes to send to the printer?">인쇄소에 전달할 디자인 유의사항을 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="면적이 큰 색상은 별색 사용이 필요한지 다시 확인했나요?" data-en="Did you double-check whether large color areas need spot color?">면적이 큰 색상은 별색 사용이 필요한지 다시 확인했나요?</span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="4. 검판 파일 체크" data-en="4. Proof File Check">4. 검판 파일 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="검판 파일의 텍스트가 최종 파일과 일치하나요?" data-en="Does the proof file text match the final file?">검판 파일의 텍스트가 최종 파일과 일치하나요?</span></label>
        <label><input type="checkbox" /><span data-ko="최종 수정사항을 몇 곳에서 다시 점검했나요?" data-en="Did you double-check final edits in multiple places?">최종 수정사항을 몇 곳에서 다시 점검했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="이미지나 글자 모양이 최종 PDF와 동일하게 표현되었나요?" data-en="Do images and typography appear the same as in the final PDF?">이미지나 글자 모양이 최종 PDF와 동일하게 표현되었나요?</span></label>
        <label><input type="checkbox" /><span data-ko="글자 아웃라인, 색 겹침, 오버프린트 문제를 확인했나요?" data-en="Did you check outlines, color overlap, and overprint issues?">글자 아웃라인, 색 겹침, 오버프린트 문제를 확인했나요?</span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="5. 인쇄 감리 체크" data-en="5. Press Check">5. 인쇄 감리 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="폰이나 노트북 화면과 비교했나요?" data-en="Did you compare it with a phone or laptop screen?">폰이나 노트북 화면과 비교했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="색 교정지를 지참했나요?" data-en="Did you bring the color proof?">색 교정지를 지참했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="일반적인 밝기에서 인쇄물 색을 확인했나요?" data-en="Did you check the print color under normal lighting?">일반적인 밝기에서 인쇄물 색을 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="본문 먹색이 너무 약하거나 짙지 않은가요?" data-en="Is the black density of the interior text appropriate?">본문 먹색이 너무 약하거나 짙지 않은가요?</span></label>
        <label><input type="checkbox" /><span data-ko="먹과 별색이 섞이는 표의 핀이 맞는지 확인했나요?" data-en="Did you check registration where black and spot colors overlap?">먹과 별색이 섞이는 표의 핀이 맞는지 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="코팅 후 색 변화를 예상했나요?" data-en="Did you anticipate color changes after coating?">코팅 후 색 변화를 예상했나요?</span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="6. 가제본 체크" data-en="6. Advance Copy Check">6. 가제본 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="표지, 띠지, 본문 색상이 알맞게 표현되었나요?" data-en="Are the cover, band, and interior colors printed correctly?">표지, 띠지, 본문 색상이 알맞게 표현되었나요?</span></label>
        <label><input type="checkbox" /><span data-ko="쪽수가 차례대로 맞나요?" data-en="Are the pages in the correct order?">쪽수가 차례대로 맞나요?</span></label>
        <label><input type="checkbox" /><span data-ko="내용이 인쇄 누락된 쪽은 없나요?" data-en="Are there any pages with missing printed content?">내용이 인쇄 누락된 쪽은 없나요?</span></label>
        <label><input type="checkbox" /><span data-ko="이미지와 타이틀/캡션이 서로 정확히 맞나요?" data-en="Do images match their titles and captions correctly?">이미지와 타이틀/캡션이 서로 정확히 맞나요?</span></label>
      </div>
    </section>

    <section class="section">
      <div class="section-title">
        <h2 data-ko="7. 입고 도서 체크" data-en="7. Arrival Copy Check">7. 입고 도서 체크</h2>
      </div>

      <div class="check-box">
        <label><input type="checkbox" /><span data-ko="쪽수가 차례대로 맞나요?" data-en="Are the pages in the correct order?">쪽수가 차례대로 맞나요?</span></label>
        <label><input type="checkbox" /><span data-ko="내용이 인쇄 누락된 쪽은 없나요?" data-en="Are there any pages with missing printed content?">내용이 인쇄 누락된 쪽은 없나요?</span></label>
        <label><input type="checkbox" /><span data-ko="입고 도서의 전체 상태를 확인했나요?" data-en="Did you check the overall condition of the delivered copies?">입고 도서의 전체 상태를 확인했나요?</span></label>
        <label><input type="checkbox" /><span data-ko="표지, 본문, 제본 상태에 이상은 없나요?" data-en="Are the cover, interior, and binding in good condition?">표지, 본문, 제본 상태에 이상은 없나요?</span></label>
      </div>
    </section>

    <section class="final-memo">
      <h2 data-ko="메모" data-en="Memo">메모</h2>
      <textarea 
        data-ko-placeholder="전체 메모를 입력하세요."
        data-en-placeholder="Enter overall notes."
        placeholder="전체 메모를 입력하세요."></textarea>
    </section>

    <section class="final-memo">
  <h2 data-ko="이미지 첨부" data-en="Image Upload">이미지 첨부</h2>

  <div class="upload">
    <label class="file-box">
      <span data-ko="파일 선택" data-en="Choose File">파일 선택</span>
      <input type="file" class="imageInput" accept="image/*" />
    </label>

    <img class="preview" alt="" />
    <button type="button" class="remove-file">삭제</button>
  </div>
</section>

    <div class="final-check-line">
      <div class="final-field">
        <span data-ko="최종확인자" data-en="Final Checker">최종확인자</span>
        <input />
      </div>

      <div class="final-field">
        <span data-ko="작성일" data-en="Date">작성일</span>
        <input />
      </div>
    </div>

    <div class="credit">
      Book Printing Error Prevention Checklist<br>
      suran75@naver.com & soyonganniekim@gmail.com, 2026
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
